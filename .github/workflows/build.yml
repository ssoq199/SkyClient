name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 查看当前目录结构
        run: |
          echo "当前目录内容："
          ls -la
          echo "如果存在 ModuleSrc.zip，解压它"
          if [ -f "ModuleSrc.zip" ]; then
            unzip -o ModuleSrc.zip
            # 查找解压后的实际目录
            EXTRACTED_DIR=$(find . -maxdepth 2 -type d -name "ModuleSrc" | head -1)
            if [ -n "$EXTRACTED_DIR" ]; then
              echo "找到解压目录: $EXTRACTED_DIR"
              cp -r $EXTRACTED_DIR/* .
            else
              # 尝试移动所有解压出来的内容
              for dir in $(ls -d */ 2>/dev/null); do
                if [ -f "$dir/build.gradle" ]; then
                  echo "找到源码目录: $dir"
                  cp -r $dir/* .
                fi
              done
            fi
          else
            echo "没有找到 ModuleSrc.zip，直接使用当前目录作为源码"
          fi
          echo "最终目录结构："
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 编译 APK
        run: |
          chmod +x gradlew 2>/dev/null || echo "gradlew 不存在"
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug --no-daemon
          else
            echo "错误：找不到 gradlew，请检查源码是否包含 gradlew 文件"
            exit 1
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
