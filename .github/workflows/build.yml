name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解压并整理源码
        run: |
          if [ -f "ModuleSrc.zip" ]; then
            echo "📦 解压 ModuleSrc.zip..."
            unzip -o ModuleSrc.zip -d temp
            shopt -s dotglob
            mv temp/* . 2>/dev/null || true
            rm -rf temp
          fi
          echo "📂 当前目录内容："
          ls -la
          echo "📂 app 目录："
          ls -la app/ || echo "❌ app 目录不存在"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装最新 Gradle
        run: |
          sudo apt update
          sudo apt install gradle -y
          gradle --version

      - name: 编译 APK（使用系统 Gradle）
        run: |
          # 确保根目录有 build.gradle
          if [ -f "build.gradle" ]; then
            gradle assembleDebug --no-daemon
          else
            echo "❌ 找不到 build.gradle，请检查目录结构"
            exit 1
          fi

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
