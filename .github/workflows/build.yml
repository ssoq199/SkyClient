name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解压 ModuleSrc.zip
        run: |
          unzip ModuleSrc.zip -d ModuleSrc
          mv ModuleSrc/ModuleSrc/* ModuleSrc/ 2>/dev/null || true
          cp -r ModuleSrc/* .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 编译 APK
        run: ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
