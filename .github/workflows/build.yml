name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解压并定位源码目录
        run: |
          # 如果存在压缩包，解压
          if [ -f "ModuleSrc.zip" ]; then
            echo "📦 解压 ModuleSrc.zip..."
            unzip -o ModuleSrc.zip -d temp
            shopt -s dotglob
            mv temp/* . 2>/dev/null || true
            rm -rf temp
          fi
          echo "📂 当前根目录内容："
          ls -la

          # 查找包含 app 子目录的目录
          APP_DIR=$(find . -type d -name "app" -print -quit)
          if [ -n "$APP_DIR" ]; then
            echo "✅ 找到 app 目录: $APP_DIR"
            PROJECT_ROOT=$(dirname "$APP_DIR")
            echo "项目根目录: $PROJECT_ROOT"
            echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          else
            echo "❌ 未找到 app 目录"
            exit 1
          fi

          # 如果项目根目录没有 build.gradle，自动创建
          if [ ! -f "$PROJECT_ROOT/build.gradle" ]; then
            echo "⚠️ 未找到 build.gradle，正在自动生成..."
            cat > "$PROJECT_ROOT/build.gradle" << 'EOF'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
}
allprojects {
    repositories { google(); mavenCentral() }
}
EOF
            cat > "$PROJECT_ROOT/settings.gradle" << 'EOF'
include ':app'
EOF
          fi

          # 如果 app 目录没有 build.gradle，报错
          if [ ! -f "$PROJECT_ROOT/app/build.gradle" ]; then
            echo "❌ app 目录下没有 build.gradle"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Gradle
        run: |
          sudo apt update
          sudo apt install gradle -y

      - name: 编译 APK
        run: |
          cd $PROJECT_ROOT
          gradle assembleDebug --no-daemon

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
