name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 解压并整理源码
        run: |
          if [ -f "ModuleSrc.zip" ]; then
            echo "📦 解压 ModuleSrc.zip..."
            unzip -o ModuleSrc.zip -d temp
            # 把 temp 下所有内容移到根目录（包括隐藏文件）
            shopt -s dotglob
            mv temp/* . 2>/dev/null || true
            rm -rf temp
          fi
          echo "📂 当前目录内容："
          ls -la
          echo "📂 app 目录："
          ls -la app/ || echo "❌ app 目录不存在，请检查压缩包"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成 Gradle Wrapper（如果缺失）
        run: |
          if [ ! -f "gradlew" ]; then
            echo "🔄 gradlew 缺失，正在生成..."
            sudo apt update && sudo apt install gradle -y
            gradle wrapper
            chmod +x gradlew
          else
            chmod +x gradlew
          fi

      - name: 编译 APK
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
